name: XDR Generator

on:
  push:
    branches: [master]
    paths:
      - 'tools/xdr-generator/**'
      - 'xdr/*.x'
      - 'lib/src/xdr/**'
  pull_request:
    branches: [master]
    paths:
      - 'tools/xdr-generator/**'
      - 'xdr/*.x'
      - 'lib/src/xdr/**'

permissions:
  contents: read

concurrency:
  group: xdr-generator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  snapshot-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: tools/xdr-generator/vendor/bundle
          key: gems-${{ hashFiles('tools/xdr-generator/Gemfile.lock') }}

      - name: Run generator snapshot tests
        run: make xdr-generator-test

  generated-files-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: tools/xdr-generator/vendor/bundle
          key: gems-${{ hashFiles('tools/xdr-generator/Gemfile.lock') }}

      - name: Regenerate XDR files
        run: make xdr-generate

      - name: Check for uncommitted changes
        run: |
          if ! git diff --quiet lib/src/xdr/ || \
             [ -n "$(git ls-files --others --exclude-standard lib/src/xdr/)" ]; then
            echo "::error::Generated XDR files are out of date."
            echo "Run 'make xdr-update' and commit the results."
            echo ""
            echo "Modified files:"
            git diff --stat lib/src/xdr/
            echo ""
            echo "Untracked files:"
            git ls-files --others --exclude-standard lib/src/xdr/
            exit 1
          fi
