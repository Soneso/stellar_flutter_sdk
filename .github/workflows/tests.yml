name: Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        flutter-version: ['3.32.x', '3.35.x', '3.38.x']

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ matrix.flutter-version }}
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: dart analyze lib/ --fatal-warnings

      - name: Run unit tests (without coverage)
        if: matrix.flutter-version != '3.38.x'
        run: flutter test test/unit/

      - name: Run unit tests with coverage
        if: matrix.flutter-version == '3.38.x'
        run: flutter test test/unit/ --coverage

      - name: Upload coverage to Codecov
        if: matrix.flutter-version == '3.38.x'
        uses: codecov/codecov-action@3f20e214133d0983f9a10f3d63b0faf9241a3daa # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: false
          verbose: true
